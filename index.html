<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque ETA SJB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .aba-ativa { border-bottom: 3px solid #3b82f6; font-weight: bold; color: #1e40af; }
        .modal-blur { backdrop-filter: blur(8px); }
        #app-container { display: none; }
        
        #chat-widget { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(20px); opacity: 0; pointer-events: none; }
        #chat-widget.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
        .msg-bubble { max-width: 85%; padding: 8px 12px; border-radius: 18px; font-size: 12px; margin-bottom: 6px; position: relative; }
        .msg-other { background: #e4e6eb; color: black; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-me { background: #0084ff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }

        @media print {
            body * { visibility: hidden !important; }
            #print-area, #print-area * { visibility: visible !important; }
            #print-area { 
                position: absolute; left: 0; top: 0; width: 100%; height: 100vh;
                display: flex !important; flex-direction: column; 
                background: white; padding: 1.5cm; box-sizing: border-box;
            }
            .assinatura-container { margin-top: auto; padding-bottom: 1cm; width: 100%; text-align: center; }
            @page { size: A4; margin: 0; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="print-area" class="hidden"></div>

    <div id="modal-usuario" class="fixed inset-0 bg-black/60 z-[450] hidden flex items-center justify-center p-4 modal-blur">
        <div class="bg-white w-full max-w-sm rounded-[32px] shadow-2xl p-6">
            <h2 class="text-xl font-black text-gray-800 mb-4 uppercase text-center tracking-tighter">Novo Acesso</h2>
            <form id="form-usuario" class="space-y-3" onsubmit="salvarNovoUsuario(event)">
                <input type="text" id="new-user-name" placeholder="Nome de Usuário" class="w-full border rounded-xl p-3 text-sm outline-none" required>
                <input type="email" id="new-user-email" placeholder="E-mail" class="w-full border rounded-xl p-3 text-sm outline-none" required>
                <input type="password" id="new-user-pass" placeholder="Senha" class="w-full border rounded-xl p-3 text-sm outline-none" required>
                <div class="grid grid-cols-2 gap-3 pt-4">
                    <button type="button" onclick="fecharModalUsuario()" class="bg-gray-100 text-gray-500 font-black py-4 rounded-2xl uppercase text-[10px]">Cancelar</button>
                    <button type="submit" class="bg-blue-600 text-white font-black py-4 rounded-2xl uppercase text-[10px] shadow-lg">Cadastrar</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-os" class="fixed inset-0 bg-black/60 z-[400] hidden flex items-center justify-center p-4 modal-blur">
        <div class="bg-white w-full max-w-lg rounded-[32px] shadow-2xl p-6 overflow-y-auto max-h-[90vh]">
            <h2 class="text-xl font-black text-gray-800 mb-4 uppercase text-center">Gerar Ordem de Serviço</h2>
            <form id="form-os" class="space-y-3" onsubmit="salvarOS(event)">
                <input type="text" id="os-nome" placeholder="Nome do Cliente" class="w-full border rounded-xl p-3 text-sm outline-none" required>
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="os-endereco" placeholder="Endereço" class="border rounded-xl p-3 text-sm outline-none" required>
                    <input type="text" id="os-bairro" placeholder="Bairro" class="border rounded-xl p-3 text-sm outline-none" required>
                </div>
                <input type="text" id="os-ponto" placeholder="Ponto de Referência" class="w-full border rounded-xl p-3 text-sm outline-none">
                <select id="os-prioridade" class="w-full border rounded-xl p-3 text-sm outline-none bg-gray-50">
                    <option value="Baixo">🟢 Baixo</option>
                    <option value="Comum" selected>⚪ Comum</option>
                    <option value="Alta">🟡 Alta</option>
                    <option value="Urgente">🔴 Urgente</option>
                </select>
                <div class="border-t pt-3">
                    <p class="text-[10px] font-black text-gray-400 mb-2 uppercase">Materiais Selecionados:</p>
                    <div id="os-carrinho" class="space-y-2 mb-3"></div>
                    <button type="button" onclick="adicionarMaterialNaOS()" class="w-full bg-blue-50 text-blue-600 font-bold py-2 rounded-xl text-xs">+ Adicionar Item de Estoque</button>
                </div>
                <div class="grid grid-cols-2 gap-3 pt-4">
                    <button type="button" onclick="fecharModalOS()" class="bg-gray-100 text-gray-500 font-black py-4 rounded-2xl uppercase text-[10px]">Cancelar</button>
                    <button type="submit" class="bg-blue-600 text-white font-black py-4 rounded-2xl uppercase text-[10px] shadow-lg">Salvar O.S.</button>
                </div>
            </form>
        </div>
    </div>

    <div id="auth-container" class="fixed inset-0 bg-blue-600 flex items-center justify-center p-4 z-[300]">
        <div class="bg-white w-full max-w-sm rounded-[32px] shadow-2xl p-8 text-center">
            <h2 class="text-2xl font-black text-gray-800 mb-6 uppercase tracking-tighter">Acesso ao Sistema</h2>
            <div class="space-y-4">
                <input type="text" id="login-user" placeholder="Usuário" class="w-full border-b-2 p-3 outline-none focus:border-blue-500">
                <input type="password" id="login-pass" placeholder="Senha" class="w-full border-b-2 p-3 outline-none focus:border-blue-500">
            </div>
            <button onclick="fazerLogin()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl mt-6 shadow-lg">ENTRAR</button>
        </div>
    </div>

    <div id="app-container">
        <header class="max-w-6xl mx-auto p-4 flex justify-between items-center bg-white shadow-sm rounded-2xl mt-4 mb-6 mx-4">
            <div>
                <h1 class="text-xl font-black text-gray-800 uppercase tracking-tighter">Estoque ETA SJB</h1>
                <span id="display-user" class="text-[10px] text-blue-500 font-black uppercase tracking-widest">---</span>
            </div>
            <div class="flex gap-2">
                <button onclick="abrirModalOS()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-md">Nova O.S.</button>
                <div class="relative">
                    <button id="btn-config" onclick="toggleMenu()" class="bg-gray-100 p-2 rounded-xl text-gray-600 focus:bg-gray-200">⚙️</button>
                    <div id="dropdown-config" class="hidden absolute right-0 top-full mt-2 w-48 z-[600]">
                        <div id="menu-content" class="bg-white border rounded-xl shadow-xl p-2"></div>
                    </div>
                </div>
            </div>
        </header>

        <div id="app" class="max-w-6xl mx-auto p-4 pb-24">
            <nav class="flex justify-around text-[10px] font-black text-gray-400 border-b p-4 uppercase bg-white rounded-t-2xl">
                <button id="btn-estoque" onclick="mudarAba('estoque')" class="aba-ativa">Estoque</button>
                <button id="btn-ordens" onclick="mudarAba('ordens')">Ordens</button>
                <button id="btn-relatorios" onclick="mudarAba('relatorios')">Movimentações</button>
            </nav>

            <div class="bg-white p-4 rounded-b-2xl border-x border-b shadow-sm min-h-[400px]">
                <section id="aba-estoque" class="aba-secao">
                    <div id="lista-estoque" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </section>
                <section id="aba-ordens" class="aba-secao hidden">
                    <div id="lista-ordens" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </section>
                <section id="aba-relatorios" class="aba-secao hidden">
                    <div id="historico-agrupado" class="space-y-6"></div>
                </section>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rkdpdfewahcrvmnuhptu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrZHBkZmV3YWhjcnZtbnVocHR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTQxNzQsImV4cCI6MjA5MTEzMDE3NH0.5hx8QhIEnEIQ8aZhXlvoOENg0MCBtSgFYh_4mTNCe4k';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userAtual = localStorage.getItem('estoque_user') || "";
        let ordensCache = [];
        let carrinhoOS = [];

        window.onload = () => { if (userAtual) entrarNoApp(); };

        async function fazerLogin() {
            const u = document.getElementById('login-user').value.trim();
            const p = document.getElementById('login-pass').value.trim();
            const { data } = await _supabase.from('usuarios_sistema').select('*').eq('username', u).eq('senha', p);
            if(data?.length > 0) { userAtual = data[0].username; localStorage.setItem('estoque_user', userAtual); entrarNoApp(); } else alert("Dados inválidos.");
        }

        function entrarNoApp() { document.getElementById('auth-container').classList.add('hidden'); document.getElementById('app-container').style.display = 'block'; document.getElementById('display-user').innerText = `USUÁRIO: ${userAtual}`; carregarEstoque(); }
        function logout() { localStorage.clear(); location.reload(); }

        function toggleMenu() {
            const menu = document.getElementById('dropdown-config');
            const content = document.getElementById('menu-content');
            let menuHtml = "";
            if (userAtual === "Guilherme") {
                menuHtml += `
                    <button onclick="cadastrarCategoria()" class="w-full text-left p-3 text-[10px] font-bold uppercase hover:bg-gray-50 rounded-lg">📁 Nova Categoria</button>
                    <button onclick="cadastrarProduto()" class="w-full text-left p-3 text-[10px] font-bold uppercase hover:bg-gray-50 rounded-lg">📦 Novo Produto</button>
                    <button onclick="adicionarQuantidadeEstoque()" class="w-full text-left p-3 text-[10px] font-bold uppercase text-green-600 hover:bg-gray-50 rounded-lg">➕ Entrada Estoque</button>
                    <button onclick="abrirModalUsuario()" class="w-full text-left p-3 text-[10px] font-bold uppercase text-blue-600 hover:bg-blue-50 rounded-lg">👤 Novo Usuário</button>
                    <hr class="my-1 border-gray-100">`;
            }
            menuHtml += `<button onclick="logout()" class="w-full text-left p-3 text-[10px] font-black text-red-500 hover:bg-red-50 rounded-lg uppercase">Sair do Sistema</button>`;
            content.innerHTML = menuHtml;
            menu.classList.toggle('hidden');
        }

        function abrirModalUsuario() { document.getElementById('modal-usuario').classList.remove('hidden'); document.getElementById('dropdown-config').classList.add('hidden'); }
        function fecharModalUsuario() { document.getElementById('modal-usuario').classList.add('hidden'); document.getElementById('form-usuario').reset(); }
        
        async function salvarNovoUsuario(e) {
            e.preventDefault();
            const user = document.getElementById('new-user-name').value.trim();
            const email = document.getElementById('new-user-email').value.trim();
            const pass = document.getElementById('new-user-pass').value.trim();
            const { error } = await _supabase.from('usuarios_sistema').insert([{ username: user, email: email, senha: pass }]);
            if(!error) { alert("Usuário cadastrado!"); fecharModalUsuario(); } else alert("Erro: " + error.message);
        }

        function mudarAba(idAba) {
            const secoes = ['aba-estoque', 'aba-ordens', 'aba-relatorios'];
            const botoes = ['btn-estoque', 'btn-ordens', 'btn-relatorios'];
            secoes.forEach(s => document.getElementById(s).classList.add('hidden'));
            botoes.forEach(b => document.getElementById(b).classList.remove('aba-ativa'));
            document.getElementById(`aba-${idAba}`).classList.remove('hidden');
            document.getElementById(`btn-${idAba}`).classList.add('aba-ativa');
            if(idAba === 'estoque') carregarEstoque();
            if(idAba === 'ordens') carregarOrdens();
            if(idAba === 'relatorios') carregarHistorico();
        }

        async function carregarEstoque() {
            const { data } = await _supabase.from('itens').select('*, categorias(nome)').order('nome');
            if(data) document.getElementById('lista-estoque').innerHTML = data.map(it => `<div class="bg-white p-4 border rounded-xl flex justify-between shadow-sm"><span class="font-bold uppercase text-[11px]">${it.nome}</span><span class="text-blue-600 font-black text-[11px]">DISP: ${it.quantidade}</span></div>`).join('');
        }

        async function carregarOrdens() {
            const { data } = await _supabase.from('ordens_servico').select('*').order('data_hora', {ascending: false});
            if(data) {
                ordensCache = data;
                document.getElementById('lista-ordens').innerHTML = data.map(os => `
                    <div class="bg-white p-5 rounded-2xl border shadow-md relative">
                        ${userAtual === 'Guilherme' ? `<button onclick="excluirOrdem('${os.id}')" class="absolute top-4 right-4 text-gray-300 hover:text-red-500 text-xs">🗑️</button>` : ''}
                        <h3 class="font-black uppercase pr-6">${os.nome_cliente}</h3>
                        <p class="text-[10px] text-gray-500 mb-4">${os.endereco}</p>
                        <button onclick="imprimirOS('${os.id}')" class="w-full bg-gray-800 text-white p-2 rounded-xl text-[10px] font-black">IMPRIMIR</button>
                    </div>`).join('');
            }
        }

        async function excluirOrdem(id) {
            if(confirm("Deseja excluir esta Ordem de Serviço?")) {
                const { error } = await _supabase.from('ordens_servico').delete().eq('id', id);
                if(!error) carregarOrdens();
            }
        }

        async function carregarHistorico() {
            const container = document.getElementById('historico-agrupado');
            container.innerHTML = `<p class="text-center text-[10px] font-black uppercase text-gray-400 p-10">Carregando movimentações...</p>`;
            const { data, error } = await _supabase.from('movimentacoes').select('*, itens(nome)').order('data_movimentacao', {ascending: false});
            if(error || !data) { container.innerHTML = `<p class="text-center text-red-500 text-[10px] font-black uppercase">ERRO AO CARREGAR</p>`; return; }
            
            const mesesNomes = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            const agrupado = {};
            data.forEach(mov => {
                const d = new Date(mov.data_movimentacao);
                const a = d.getFullYear(); const m = mesesNomes[d.getMonth()];
                if (!agrupado[a]) agrupado[a] = {}; if (!agrupado[a][m]) agrupado[a][m] = [];
                agrupado[a][m].push(mov);
            });
            let html = "";
            Object.keys(agrupado).sort((a,b)=>b-a).forEach(ano => {
                html += `<div class="mb-8"><h2 class="text-lg font-black text-gray-800 border-l-4 border-blue-600 pl-3 mb-4 uppercase tracking-tighter">${ano}</h2>`;
                Object.keys(agrupado[ano]).sort((a,b)=>mesesNomes.indexOf(b)-mesesNomes.indexOf(a)).forEach(mes => {
                    html += `<div class="bg-gray-100/50 rounded-3xl p-5 mb-6 border border-gray-200"><h3 class="text-[11px] font-black text-blue-600 uppercase mb-4 tracking-widest flex items-center">📅 ${mes}</h3><div class="grid grid-cols-1 gap-3">`;
                    agrupado[ano][mes].forEach(mov => {
                        const isEntrada = mov.quantidade_alterada > 0;
                        const cor = isEntrada ? "text-green-600" : (mov.quantidade_alterada < 0 ? "text-red-600" : "text-gray-400");
                        const sinal = isEntrada ? "+" : "";
                        const hora = new Date(mov.data_movimentacao).toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
                        html += `
                            <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm flex justify-between items-center relative group">
                                <div>
                                    <p class="font-black text-[11px] text-gray-800 uppercase leading-none">${mov.itens?.nome || 'Item Excluído'}</p>
                                    <p class="text-[8px] font-bold text-gray-400 uppercase mt-1">🕒 ${hora} • ${mov.tipo}</p>
                                </div>
                                <div class="flex items-center gap-4">
                                    <span class="font-black ${cor} text-[13px] tabular-nums">${sinal}${mov.quantidade_alterada} UN</span>
                                    ${userAtual === 'Guilherme' ? `<button onclick="excluirMovimentacao('${mov.id}')" class="text-gray-300 hover:text-red-500 text-xs p-1">🗑️</button>` : ''}
                                </div>
                            </div>`;
                    });
                    html += `</div></div>`;
                });
                html += `</div>`;
            });
            container.innerHTML = html || `<p class="text-center text-[10px] font-black uppercase text-gray-400 p-10">Sem movimentações.</p>`;
        }

        // FUNÇÃO DE EXCLUSÃO CORRIGIDA
        async function excluirMovimentacao(id) {
            if(confirm("Excluir este registro de histórico? Isso não alterará o saldo atual do estoque.")) {
                const { error } = await _supabase.from('movimentacoes').delete().eq('id', id);
                if(!error) {
                    carregarHistorico();
                } else {
                    alert("Erro ao excluir registro: " + error.message);
                }
            }
        }

        function imprimirOS(id) {
            const os = ordensCache.find(x => x.id === id);
            if(!os) return;
            const area = document.getElementById('print-area');
            area.innerHTML = `
                <div style="flex: 1;">
                    <h1 style="text-align: center; text-transform: uppercase; font-size: 18px; border-bottom: 2px solid #000; padding-bottom: 8px; margin-bottom: 15px;">Ordem de Serviço</h1>
                    <div style="font-size: 11px; line-height: 1.4; margin-bottom: 20px;">
                        <p><b>CLIENTE:</b> ${os.nome_cliente}</p>
                        <p><b>ENDEREÇO:</b> ${os.endereco}, ${os.bairro}</p>
                        <p><b>PONTO DE REF:</b> ${os.ponto_referencia || 'N/A'}</p>
                    </div>
                    <table style="width: 100%; border-collapse: collapse; font-size: 11px;">
                        <thead><tr style="background: #eee;"><th style="border: 1px solid #000; padding: 6px; text-align: left;">DESCRIÇÃO</th><th style="border: 1px solid #000; padding: 6px; width: 80px;">QUANTIDADE</th></tr></thead>
                        <tbody>${os.materiais_json.map(m => `<tr><td style="border: 1px solid #000; padding: 6px;">${m.nome}</td><td style="border: 1px solid #000; padding: 6px; text-align: center;">${m.quantidade} UN</td></tr>`).join('')}</tbody>
                    </table>
                </div>
                <div class="assinatura-container">
                    <div style="border-top: 1.5px solid #000; width: 300px; margin: 0 auto; padding-top: 5px; font-size: 10px; font-weight: bold; text-transform: uppercase;">
                        Assinatura do Responsável
                    </div>
                </div>`;
            window.print();
        }

        function abrirModalOS() { carrinhoOS = []; renderizarCarrinhoOS(); document.getElementById('modal-os').classList.remove('hidden'); }
        function fecharModalOS() { document.getElementById('modal-os').classList.add('hidden'); }
        function renderizarCarrinhoOS() { document.getElementById('os-carrinho').innerHTML = carrinhoOS.map(i=>`<div class="text-[9px] bg-blue-50 p-2 border rounded-lg flex justify-between uppercase"><span>${i.nome}</span><b>${i.quantidade}x</b></div>`).join(''); }
        
        async function adicionarMaterialNaOS() {
            const { data } = await _supabase.from('itens').select('*').order('nome');
            const e = prompt("Escolha o Item:\n" + data.map((it,idx)=>`${idx}) ${it.nome} (Disp: ${it.quantidade})`).join('\n'));
            if(data[e]) { const q = parseInt(prompt("Quantidade:")); if(q > 0) { carrinhoOS.push({id:data[e].id, nome:data[e].nome, quantidade:q}); renderizarCarrinhoOS(); } }
        }

        async function salvarOS(e) {
            e.preventDefault();
            const { error } = await _supabase.from('ordens_servico').insert([{ nome_cliente: document.getElementById('os-nome').value, endereco: document.getElementById('os-endereco').value, bairro: document.getElementById('os-bairro').value, ponto_referencia: document.getElementById('os-ponto').value, prioridade: document.getElementById('os-prioridade').value, materiais_json: carrinhoOS, autor: userAtual }]);
            if(!error) {
                for(let item of carrinhoOS) {
                    const { data: itemBD } = await _supabase.from('itens').select('quantidade').eq('id', item.id).single();
                    await _supabase.from('itens').update({ quantidade: itemBD.quantidade - item.quantidade }).eq('id', item.id);
                    await _supabase.from('movimentacoes').insert([{ item_id: item.id, quantidade_alterada: -item.quantidade, tipo: 'SAÍDA (O.S.)' }]);
                }
                alert("O.S. Salva!"); fecharModalOS(); mudarAba('ordens');
            }
        }

        async function cadastrarCategoria() { const n = prompt("Nova Categoria:"); if(n) await _supabase.from('categorias').insert([{ nome: n.toUpperCase() }]); carregarEstoque(); }
        async function cadastrarProduto() {
            const { data: cats } = await _supabase.from('categorias').select('*');
            const i = prompt("Categoria:\n" + cats.map((c, idx) => `${idx} - ${c.nome}`).join('\n'));
            const n = prompt("Produto:"); 
            if (n && cats[i]) {
                const { data: nIt } = await _supabase.from('itens').insert([{ nome: n.toUpperCase(), categoria_id: cats[i].id, quantidade: 0 }]).select().single();
                if(nIt) await _supabase.from('movimentacoes').insert([{ item_id: nIt.id, quantidade_alterada: 0, tipo: 'PRODUTO NOVO' }]);
                carregarEstoque();
            }
        }
        async function adicionarQuantidadeEstoque() {
            const { data: its } = await _supabase.from('itens').select('*').order('nome');
            const i = prompt("Produto:\n" + its.map((it, idx) => `${idx} - ${it.nome}`).join('\n'));
            const q = parseInt(prompt("Quantidade:")); 
            if (its[i] && !isNaN(q)) { 
                await _supabase.from('itens').update({ quantidade: its[i].quantidade + q }).eq('id', its[i].id); 
                await _supabase.from('movimentacoes').insert([{ item_id: its[i].id, quantidade_alterada: q, tipo: 'ENTRADA' }]); 
                carregarEstoque(); 
            }
        }
    </script>
</body>
</html>
