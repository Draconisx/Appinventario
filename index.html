<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Master Pro - Sistema Integrado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .aba-ativa { border-bottom: 3px solid #3b82f6; font-weight: bold; color: #1e40af; }
        .card-clicavel { cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
        .card-clicavel:active { transform: scale(0.96); background-color: #f3f4f6; }
        .modal-blur { backdrop-filter: blur(8px); }
        .dropdown-content { display: none; position: absolute; right: 0; top: 100%; z-index: 50; }
        .dropdown:hover .dropdown-content { display: block; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-20">

    <div id="modal-detalhe-geral" class="fixed inset-0 bg-black/60 z-[110] hidden flex items-center justify-center p-4 modal-blur">
        <div class="bg-white w-full max-w-sm rounded-[32px] shadow-2xl p-8 text-center">
            <h3 id="detalhe-titulo" class="font-black text-gray-800 uppercase text-sm mb-4"></h3>
            <div id="detalhe-conteudo" class="space-y-4 text-sm text-gray-600 max-h-[50vh] overflow-y-auto text-left"></div>
            <div class="mt-6 space-y-2">
                <button onclick="document.getElementById('modal-detalhe-geral').classList.add('hidden')" class="w-full bg-gray-800 text-white font-black py-4 rounded-2xl">FECHAR</button>
                <button id="btn-excluir-os" class="w-full bg-red-50 text-red-500 font-black py-3 rounded-2xl text-[10px] uppercase hidden">Excluir O.S.</button>
            </div>
        </div>
    </div>

    <div id="app" class="max-w-2xl mx-auto p-4">
        <header class="bg-white shadow-sm rounded-2xl p-5 mb-6 border border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 class="text-xl font-black text-gray-800">MEU ESTOQUE</h1>
                    <span id="user-display-cargo" class="text-[10px] text-blue-500 font-black tracking-widest uppercase"></span>
                </div>
                
                <div id="menu-admin-container" class="relative dropdown">
                    <button class="bg-gray-100 p-3 rounded-xl text-gray-600 hover:bg-gray-200 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                        </svg>
                    </button>
                    <div class="dropdown-content pt-2 w-56">
                        <div class="bg-white border rounded-2xl shadow-2xl p-2 space-y-1">
                            <button onclick="window.criarCategoria()" class="w-full text-left px-4 py-3 text-[10px] font-black uppercase hover:bg-gray-50 rounded-xl">📁 Nova Categoria</button>
                            <button onclick="window.criarItem()" class="w-full text-left px-4 py-3 text-[10px] font-black uppercase hover:bg-gray-50 rounded-xl">📦 Novo Produto</button>
                            <button onclick="window.adicionarQuantidadeEstoque()" class="w-full text-left px-4 py-3 text-[10px] font-black uppercase text-green-600 hover:bg-green-50 rounded-xl">➕ Entrada</button>
                            <hr class="my-1">
                            <button onclick="window.abrirModalOS()" class="w-full text-left px-4 py-3 text-[10px] font-black uppercase text-blue-600 hover:bg-blue-50 rounded-xl">📝 Gerar O.S.</button>
                        </div>
                    </div>
                </div>
            </div>

            <nav class="flex justify-around text-[10px] font-black text-gray-400 border-t pt-4 uppercase">
                <button id="btn-estoque" onclick="mudarAba('estoque')" class="aba-ativa">Estoque</button>
                <button id="btn-chat" onclick="mudarAba('chat')">Chat</button>
                <button id="btn-relatorios" onclick="mudarAba('relatorios')">O.S.</button>
                <button id="btn-staff" onclick="mudarAba('staff')" class="hidden text-purple-600">Staff</button>
            </nav>
        </header>

        <section id="aba-estoque" class="aba"><div id="lista-estoque" class="space-y-4"></div></section>
        <section id="aba-chat" class="aba hidden"><div id="contatos-container" class="space-y-2"></div></section>
        <section id="aba-relatorios" class="aba hidden"><div id="historico-os" class="space-y-3"></div></section>
        
        <section id="aba-staff" class="aba hidden">
            <h2 class="text-[10px] font-black text-gray-400 uppercase mb-4">Gestão de Níveis</h2>
            <div id="lista-usuarios-staff" class="space-y-2"></div>
        </section>
    </div>

    <script>
        const SUPABASE_URL = 'https://rkdpdfewahcrvmnuhptu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrZHBkZmV3YWhjcnZtbnVocHR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTQxNzQsImV4cCI6MjA5MTEzMDE3NH0.5hx8QhIEnEIQ8aZhXlvoOENg0MCBtSgFYh_4mTNCe4k';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let usuarioAtual = { nome_usuario: "Jardim", nivel: "ADMIN" }; // Nível inicial para carga
        let todosOsItens = [];

        // --- ABA STAFF: PERSISTÊNCIA NO BANCO ---
        window.renderizarStaff = async () => {
            const { data } = await _supabase.from('usuarios').select('*').order('nome_usuario');
            const container = document.getElementById('lista-usuarios-staff');
            container.innerHTML = data.map(u => `
                <div class="bg-white p-4 rounded-xl border flex justify-between items-center shadow-sm">
                    <span class="text-xs font-bold uppercase">${u.nome_usuario}</span>
                    <select onchange="window.persistirNivelUsuario('${u.id}', this.value)" class="text-[10px] font-black border rounded px-2 py-1 bg-gray-50 focus:ring-2 focus:ring-blue-500">
                        <option value="USER" ${u.nivel === 'USER' ? 'selected' : ''}>USER</option>
                        <option value="ADMIN" ${u.nivel === 'ADMIN' ? 'selected' : ''}>ADMIN</option>
                    </select>
                </div>`).join('');
        };

        window.persistirNivelUsuario = async (userId, novoNivel) => {
            const { error } = await _supabase.from('usuarios').update({ nivel: novoNivel }).eq('id', userId);
            if(error) {
                alert("Erro ao salvar alteração!");
            } else {
                // Feedback visual de sucesso
                const toast = document.createElement('div');
                toast.className = "fixed bottom-24 left-1/2 -translate-x-1/2 bg-green-500 text-white px-4 py-2 rounded-full text-[10px] font-black uppercase shadow-lg z-[200]";
                toast.innerText = `Nível salvo: ${novoNivel}`;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            }
        };

        // --- SISTEMA CORE (NAVEGAÇÃO E DROPDOWN) ---
        async function carregarDadosIniciais() {
            // Verifica o nível real no banco antes de liberar o menu
            const { data: userDb } = await _supabase.from('usuarios').select('nivel').eq('nome_usuario', usuarioAtual.nome_usuario).single();
            if(userDb) usuarioAtual.nivel = userDb.nivel;

            const isAdm = usuarioAtual.nivel === "ADMIN";
            document.getElementById('user-display-cargo').innerText = `${usuarioAtual.nivel} | ${usuarioAtual.nome_usuario}`;
            document.getElementById('menu-admin-container').classList.toggle('hidden', !isAdm);
            document.getElementById('btn-staff').classList.toggle('hidden', !isAdm);
            
            carregarEstoque();
        }

        function mudarAba(aba) {
            document.querySelectorAll('.aba').forEach(a => a.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('aba-ativa'));
            document.getElementById(`aba-${aba}`).classList.remove('hidden');
            document.getElementById(`btn-${aba}`).classList.add('aba-ativa');
            if(aba === 'staff') window.renderizarStaff();
            if(aba === 'relatorios') renderizarHistoricoOS();
            if(aba === 'chat') renderizarContatos();
        }

        // --- ADMIN FUNCTIONS ---
        window.criarCategoria = async () => {
            const nome = prompt("Nome da categoria:").toUpperCase();
            if(nome) { await _supabase.from('categorias').insert([{ nome }]); carregarEstoque(); }
        };

        window.criarItem = async () => {
            const { data: cats } = await _supabase.from('categorias').select('*');
            const escolha = prompt("Selecione a Categoria:\n" + cats.map((c,i)=>`${i}) ${c.nome}`).join('\n'));
            const nome = prompt("Nome do produto:");
            if(nome && cats[escolha]) { 
                await _supabase.from('itens').insert([{ nome, categoria_id: cats[escolha].id, quantidade: 0 }]); 
                carregarEstoque(); 
            }
        };

        window.adicionarQuantidadeEstoque = async () => {
            const { data: itens } = await _supabase.from('itens').select('*').order('nome');
            const escolha = prompt("Selecione o Produto:\n" + itens.map((it,i)=>`${i}) ${it.nome}`).join('\n'));
            const qtd = parseInt(prompt("Quantidade:"));
            if(itens[escolha] && !isNaN(qtd)) {
                await _supabase.from('itens').update({ quantidade: itens[escolha].quantidade + qtd }).eq('id', itens[escolha].id);
                await _supabase.from('historico_movimentacao').insert([{ tipo: 'ENTRADA', quantidade: qtd, item_id: itens[escolha].id, observacao: 'Admin' }]);
                carregarEstoque();
            }
        };

        async function carregarEstoque() {
            const { data } = await _supabase.from('itens').select('*, categorias(nome)').order('nome');
            todosOsItens = data || [];
            const lista = document.getElementById('lista-estoque'), cats = {};
            todosOsItens.forEach(i => { const c = i.categorias?.nome || "GERAL"; if(!cats[c]) cats[c] = []; cats[c].push(i); });
            lista.innerHTML = Object.keys(cats).map(c => `
                <div class="bg-white rounded-xl border mb-4 shadow-sm overflow-hidden">
                    <div class="bg-gray-50 p-2 text-[8px] font-black text-gray-400 border-b uppercase">${c}</div>
                    ${cats[c].map(it => `<div class="p-4 flex justify-between border-b last:border-0"><span class="text-sm font-bold text-gray-700">${it.nome}</span><span class="text-blue-500 font-black">Qtd: ${it.quantidade}</span></div>`).join('')}
                </div>`).join('');
        }

        // Funções de suporte (OS, Chat e Histórico) permanecem as mesmas das versões anteriores
        window.onload = carregarDadosIniciais;
    </script>
</body>
</html>
