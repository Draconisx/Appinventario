<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Master Pro - Sistema Integrado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .aba-ativa { border-bottom: 3px solid #3b82f6; font-weight: bold; color: #1e40af; }
        .card-clicavel { cursor: pointer; transition: all 0.2s; }
        .card-clicavel:active { transform: scale(0.96); }
        .modal-blur { backdrop-filter: blur(8px); }
        .dropdown-content { display: none; position: absolute; right: 0; top: 100%; z-index: 50; }
        .dropdown:hover .dropdown-content { display: block; }
        input:read-only { background-color: #f3f4f6; color: #9ca3af; cursor: not-allowed; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-20">

    <div id="modal-form-os" class="fixed inset-0 bg-black/60 z-[120] hidden flex items-center justify-center p-4 modal-blur">
        <div class="bg-white w-full max-w-md rounded-[32px] shadow-2xl p-6 border border-gray-100">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-gray-800 uppercase text-xs tracking-widest">Nova Ordem de Serviço</h3>
                <button onclick="fecharFormOS()" class="text-gray-400 hover:text-gray-600">✕</button>
            </div>
            
            <form id="form-nova-os" class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[9px] font-black text-gray-400 uppercase">Encanador</label>
                        <input type="text" id="os-encanador" required class="w-full border rounded-xl p-3 text-sm outline-none">
                    </div>
                    <div>
                        <label class="text-[9px] font-black text-gray-400 uppercase">Local (Rua, Nº)</label>
                        <input type="text" id="os-local" required placeholder="Ex: Rua A, 100" class="w-full border rounded-xl p-3 text-sm outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[9px] font-black text-gray-400 uppercase">Data/Hora</label>
                        <input type="datetime-local" id="os-data-hora" required class="w-full border rounded-xl p-3 text-sm outline-none">
                    </div>
                    <div>
                        <label class="text-[9px] font-black text-gray-400 uppercase">Prioridade</label>
                        <select id="os-prioridade" required class="w-full border rounded-xl p-3 text-sm outline-none bg-white font-bold">
                            <option value="Baixa">🟢 BAIXA</option>
                            <option value="Normal" selected>🟡 NORMAL</option>
                            <option value="Alta">🔴 ALTA</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[9px] font-black text-gray-400 uppercase">Código da O.S.</label>
                        <input type="text" id="os-codigo-sequencial" readonly class="w-full border rounded-xl p-3 text-sm font-bold text-blue-600">
                    </div>
                    <div>
                        <label class="text-[9px] font-black text-gray-400 uppercase">Quantidade</label>
                        <input type="number" id="os-quantidade" required min="1" class="w-full border rounded-xl p-3 text-sm outline-none">
                    </div>
                </div>

                <div>
                    <label class="text-[9px] font-black text-gray-400 uppercase">Item do Inventário</label>
                    <select id="os-item-id" required class="w-full border rounded-xl p-3 text-sm outline-none bg-white">
                        <option value="">Selecione um item...</option>
                    </select>
                </div>

                <div>
                    <label class="text-[9px] font-black text-gray-400 uppercase">Descrição/Finalidade</label>
                    <textarea id="os-descricao" rows="2" class="w-full border rounded-xl p-3 text-sm outline-none resize-none"></textarea>
                </div>

                <button type="submit" id="btn-gravar-os" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl text-[10px] uppercase tracking-widest hover:bg-blue-700 transition shadow-lg">Gravar Ordem de Serviço</button>
            </form>
        </div>
    </div>

    <div id="modal-detalhe-geral" class="fixed inset-0 bg-black/60 z-[110] hidden flex items-center justify-center p-4 modal-blur">
        <div class="bg-white w-full max-w-sm rounded-[32px] shadow-2xl p-8 text-center">
            <h3 id="detalhe-titulo" class="font-black text-gray-800 uppercase text-xs mb-4">DETALHES</h3>
            <div id="detalhe-conteudo" class="space-y-4 text-sm text-gray-600 text-left mb-6"></div>
            <button onclick="document.getElementById('modal-detalhe-geral').classList.add('hidden')" class="w-full bg-gray-900 text-white font-black py-4 rounded-2xl text-[10px] uppercase">FECHAR</button>
        </div>
    </div>

    <div id="app" class="max-w-6xl mx-auto p-4">
        <header class="bg-white shadow-sm rounded-2xl p-5 mb-6 border border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 class="text-xl font-black text-gray-800 tracking-tighter">MEU ESTOQUE</h1>
                    <span id="user-status-display" class="text-[10px] text-blue-500 font-black uppercase tracking-widest">ADMIN | Jardim</span>
                </div>
                
                <div class="relative dropdown">
                    <button class="bg-gray-100 p-3 rounded-xl text-gray-600"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" /></svg></button>
                    <div class="dropdown-content pt-2 w-56">
                        <div class="bg-white border rounded-2xl shadow-2xl p-2 space-y-1">
                            <button onclick="window.criarCategoria()" class="w-full text-left px-4 py-3 text-[10px] font-black uppercase hover:bg-gray-50 rounded-xl">📁 Nova Categoria</button>
                            <button onclick="window.criarItem()" class="w-full text-left px-4 py-3 text-[10px] font-black uppercase hover:bg-gray-50 rounded-xl">📦 Novo Produto</button>
                            <button onclick="window.adicionarQuantidadeEstoque()" class="w-full text-left px-4 py-3 text-[10px] font-black uppercase text-green-600 hover:bg-green-50 rounded-xl">➕ Adicionar Estoque</button>
                            <hr class="my-1">
                            <button onclick="abrirFormOS()" class="w-full text-left px-4 py-3 text-[10px] font-black uppercase text-blue-600 hover:bg-blue-50 rounded-xl">📝 Gerar O.S.</button>
                            <button onclick="mudarAba('relatorio-final')" class="w-full text-left px-4 py-3 text-[10px] font-black uppercase text-purple-600 hover:bg-purple-50 rounded-xl">📊 Relatórios Detalhados</button>
                        </div>
                    </div>
                </div>
            </div>

            <nav class="flex justify-around text-[10px] font-black text-gray-400 border-t pt-4 uppercase tracking-widest">
                <button id="btn-estoque" onclick="mudarAba('estoque')" class="aba-ativa">Estoque</button>
                <button id="btn-relatorios" onclick="mudarAba('relatorios')">Feed O.S.</button>
                <button id="btn-relatorio-final" onclick="mudarAba('relatorio-final')">Relatório Detalhado</button>
            </nav>
        </header>

        <section id="aba-estoque" class="aba"><div id="lista-estoque" class="space-y-4"></div></section>
        <section id="aba-relatorios" class="aba hidden"><div id="historico-os" class="space-y-3"></div></section>
        
        <section id="aba-relatorio-final" class="aba hidden">
            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[1000px]">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="p-4 text-[9px] font-black text-gray-400 uppercase">Prioridade</th>
                            <th class="p-4 text-[9px] font-black text-gray-400 uppercase">Cód O.S.</th>
                            <th class="p-4 text-[9px] font-black text-gray-400 uppercase">Encanador</th>
                            <th class="p-4 text-[9px] font-black text-gray-400 uppercase">Local</th>
                            <th class="p-4 text-[9px] font-black text-gray-400 uppercase">Data/Hora</th>
                            <th class="p-4 text-[9px] font-black text-gray-400 uppercase">Material/Qtd</th>
                            <th class="p-4 text-[9px] font-black text-gray-400 uppercase">Finalidade</th>
                            <th class="p-4 text-[9px] font-black text-gray-400 uppercase text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-relatorio-corpo"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        const SUPABASE_URL = 'https://rkdpdfewahcrvmnuhptu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrZHBkZmV3YWhjcnZtbnVocHR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTQxNzQsImV4cCI6MjA5MTEzMDE3NH0.5hx8QhIEnEIQ8aZhXlvoOENg0MCBtSgFYh_4mTNCe4k';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let cacheMovimentacoes = [];
        let cacheItens = [];
        let nivelUsuario = "ADMIN"; 

        async function carregarDadosIniciais() {
            await carregarEstoque();
            await renderizarHistoricoOS();
        }

        function mudarAba(aba) {
            document.querySelectorAll('.aba').forEach(a => a.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('aba-ativa'));
            const btn = document.getElementById(`btn-${aba}`);
            if(btn) btn.classList.add('aba-ativa');
            document.getElementById(`aba-${aba}`).classList.remove('hidden');

            if(aba === 'relatorio-final') {
                atualizarTabelaRelatorio();
            } else if(aba === 'relatorios') {
                renderizarHistoricoOS();
            }
        }

        // --- GESTÃO DE PRODUTOS ---
        window.criarCategoria = async () => {
            const n = prompt("Nome da Categoria:");
            if(n) { await _supabase.from('categorias').insert([{ nome: n.toUpperCase() }]); carregarEstoque(); }
        };

        window.criarItem = async () => {
            const { data: c } = await _supabase.from('categorias').select('*');
            const e = prompt("Selecione Categoria:\n" + c.map((cat,i)=>`${i}) ${cat.nome}`).join('\n'));
            const n = prompt("Nome do Produto:");
            if(n && c[e]) { await _supabase.from('itens').insert([{ nome: n, categoria_id: c[e].id, quantidade: 0 }]); carregarEstoque(); }
        };

        window.adicionarQuantidadeEstoque = async () => {
            const { data: it } = await _supabase.from('itens').select('*').order('nome');
            const e = prompt("Entrada em qual produto?\n" + it.map((item,i)=>`${i}) ${item.nome}`).join('\n'));
            const q = parseInt(prompt("Qtd:"));
            if(it[e] && !isNaN(q)) {
                await _supabase.from('movimentacoes').insert([{ item_id: it[e].id, quantidade_alterada: q, data_movimentacao: new Date().toISOString() }]);
                await _supabase.from('itens').update({ quantidade: it[e].quantidade + q }).eq('id', it[e].id);
                carregarEstoque();
            }
        };

        // --- LÓGICA DE ORDEM DE SERVIÇO ---
        async function abrirFormOS() {
            const { data: itens } = await _supabase.from('itens').select('*').order('nome');
            cacheItens = itens || [];
            const select = document.getElementById('os-item-id');
            select.innerHTML = '<option value="">Selecione um item...</option>' + 
                cacheItens.map(it => `<option value="${it.id}">${it.nome} (Saldo: ${it.quantidade})</option>`).join('');

            const { data: ordens } = await _supabase.from('ordens_servico').select('id');
            document.getElementById('os-codigo-sequencial').value = `O.S. ${(ordens ? ordens.length + 1 : 1).toString().padStart(3, '0')}`;
            
            document.getElementById('form-nova-os').reset();
            document.getElementById('os-data-hora').value = new Date().toLocaleString("sv-SE").slice(0, 16);
            document.getElementById('modal-form-os').classList.remove('hidden');
        }

        function fecharFormOS() { document.getElementById('modal-form-os').classList.add('hidden'); }

        document.getElementById('form-nova-os').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-gravar-os');
            btn.disabled = true; btn.innerText = "GRAVANDO...";

            const itemId = document.getElementById('os-item-id').value;
            const qtd = parseInt(document.getElementById('os-quantidade').value);
            const encanador = document.getElementById('os-encanador').value;
            const localCompleto = document.getElementById('os-local').value;
            const finalidade = document.getElementById('os-descricao').value;
            const codigoOS = document.getElementById('os-codigo-sequencial').value;
            const prioridade = document.getElementById('os-prioridade').value;
            const itemOriginal = cacheItens.find(i => i.id === itemId);

            const detalheTexto = `[PRIORIDADE: ${prioridade}] || ENCANADOR: ${encanador} || LOCAL: ${localCompleto} || FINALIDADE: ${finalidade}`;
            const { data: movData, error: movError } = await _supabase.from('movimentacoes').insert([{ 
                item_id: itemId, 
                quantidade_alterada: -qtd,
                data_movimentacao: new Date(document.getElementById('os-data-hora').value).toISOString()
            }]).select();

            if (!movError && movData[0]) {
                await _supabase.from('observacoes').insert([{ movimentacao_id: movData[0].id, descricao: detalheTexto }]);

                const partes = localCompleto.split(',');
                await _supabase.from('ordens_servico').insert([{
                    codigo_os: codigoOS,
                    encanador: encanador,
                    endereco_rua: partes[0].trim(),
                    endereco_numero: partes[1] ? partes[1].trim() : 'S/N',
                    material_id: itemId,
                    quantidade: qtd,
                    prioridade: prioridade,
                    data_hora: new Date(document.getElementById('os-data-hora').value).toISOString(),
                    finalidade: finalidade,
                    movimentacao_vinculo_id: movData[0].id
                }]);

                await _supabase.from('itens').update({ quantidade: itemOriginal.quantidade - qtd }).eq('id', itemId);
                
                alert("O.S. Gravada com Sucesso!");
                fecharFormOS();
                await carregarEstoque();
                await renderizarHistoricoOS();
            } else {
                alert("Erro: " + (movError ? movError.message : "Desconhecido"));
            }
            btn.disabled = false; btn.innerText = "Gravar Ordem de Serviço";
        };

        // --- RENDERIZAÇÃO ---
        async function renderizarHistoricoOS() {
            const { data: movs } = await _supabase.from('movimentacoes').select('*, itens(nome), observacoes(descricao)').lt('quantidade_alterada', 0).order('data_movimentacao', { ascending: false });
            if (!movs) return;
            cacheMovimentacoes = movs;
            document.getElementById('historico-os').innerHTML = movs.map(os => `
                <div class="bg-white p-4 rounded-2xl border mb-3 flex justify-between items-center shadow-sm">
                    <div onclick="verDetalheOS('${os.id}')" class="card-clicavel flex-1">
                        <p class="text-[10px] font-black text-blue-500 uppercase">O.S.</p>
                        <h4 class="text-sm font-black text-gray-800">${os.itens?.nome}</h4>
                        <p class="text-[10px] text-gray-400">${new Date(os.data_movimentacao).toLocaleDateString()}</p>
                    </div>
                    <span class="text-red-500 font-black">${os.quantidade_alterada}</span>
                </div>`).join('');
        }

        async function atualizarTabelaRelatorio() {
            const { data: listaOS } = await _supabase.from('ordens_servico').select('*, itens(nome)').order('data_hora', { ascending: false });
            if (!listaOS) return;

            const badgeCores = {
                'Alta': 'bg-red-500 text-white',
                'Normal': 'bg-yellow-400 text-gray-900',
                'Baixa': 'bg-green-500 text-white'
            };

            document.getElementById('tabela-relatorio-corpo').innerHTML = listaOS.map(os => `
                <tr class="border-b hover:bg-gray-50 text-[11px]">
                    <td class="p-4">
                        <span class="px-2 py-1 rounded font-black text-[8px] uppercase ${badgeCores[os.prioridade] || 'bg-gray-200'}">
                            ${os.prioridade || 'Normal'}
                        </span>
                    </td>
                    <td class="p-4 font-black text-blue-600">${os.codigo_os}</td>
                    <td class="p-4 font-bold text-gray-700 uppercase">${os.encanador}</td>
                    <td class="p-4 text-gray-600">${os.endereco_rua}, ${os.endereco_numero}</td>
                    <td class="p-4 text-gray-400">${new Date(os.data_hora).toLocaleString('pt-BR')}</td>
                    <td class="p-4 font-bold">${os.itens?.nome || 'Item'} (${os.quantidade})</td>
                    <td class="p-4 text-gray-500 italic">${os.finalidade || '---'}</td>
                    <td class="p-4 text-center">
                        <button onclick="excluirOSRelatorio('${os.id}', '${os.material_id}', ${os.quantidade}, '${os.movimentacao_vinculo_id}')" 
                                class="text-red-400 hover:text-red-600 transition p-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </td>
                </tr>`).join('');
        }

        async function excluirOSRelatorio(idOS, idItem, qtd, idMovVinculo) {
            if (nivelUsuario !== "ADMIN") return alert("Somente administradores podem excluir.");
            if (!confirm("Deseja realmente excluir esta O.S.? O estoque será devolvido.")) return;

            try {
                const { data: item } = await _supabase.from('itens').select('quantidade').eq('id', idItem).single();
                await _supabase.from('itens').update({ quantidade: item.quantidade + qtd }).eq('id', idItem);
                await _supabase.from('ordens_servico').delete().eq('id', idOS);

                if (idMovVinculo && idMovVinculo !== 'undefined') {
                    await _supabase.from('observacoes').delete().eq('movimentacao_id', idMovVinculo);
                    await _supabase.from('movimentacoes').delete().eq('id', idMovVinculo);
                }

                alert("O.S. excluída e estoque estornado!");
                await carregarEstoque();
                await atualizarTabelaRelatorio();
                await renderizarHistoricoOS();
            } catch (e) { alert("Erro ao excluir."); }
        }

        window.verDetalheOS = (id) => {
            const os = cacheMovimentacoes.find(x => x.id == id);
            document.getElementById('detalhe-conteudo').innerHTML = `<p class="text-xs text-gray-700">${os?.observacoes?.[0]?.descricao.replaceAll(" || ", "<br>") || 'Sem detalhes'}</p>`;
            document.getElementById('modal-detalhe-geral').classList.remove('hidden');
        };

        async function carregarEstoque() {
            const { data } = await _supabase.from('itens').select('*, categorias(nome)').order('nome');
            if(!data) return;
            document.getElementById('lista-estoque').innerHTML = data.map(it => `
                <div class="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm">
                    <div><p class="text-[8px] font-black text-gray-400 uppercase">${it.categorias?.nome || 'Geral'}</p><span class="font-bold text-gray-700">${it.nome}</span></div>
                    <span class="text-blue-600 font-black">Saldo: ${it.quantidade}</span>
                </div>`).join('');
        }

        window.onload = carregarDadosIniciais;
    </script>
</body>
</html>
